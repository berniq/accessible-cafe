<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt – Kawiarnia Zacisze</title>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="kawiarnia-style.css">
</head>
<body>

<header>
  <nav class="site-nav nav-layout-contact" aria-label="nav">
    <div class="nav-inner">
      <li style="list-style:none"><a href="kawiarnia-menu.html" title="">📋</a></li>
      <a href="kawiarnia-index.html" class="nav-brand">☕</a>
      <ul class="nav-links">
        <li><a href="kawiarnia-index.html" title="">🏠</a></li>
        <li><a href="kawiarnia-kontakt.html" title="">✉️</a></li>
        <li><a href="kawiarnia-o-kawiarni.html" title="">🏡</a></li>
      </ul>
    </div>
  </nav>
</header>

<main>
  <div class="page-header">
    <div class="container">
      <nav class="breadcrumb">
        <a href="kawiarnia-index.html">start</a> › kontakt
      </nav>
      <h1>Kontakt</h1>
      <p>Napisz do nas.</p>
    </div>
  </div>

  <div class="page-content">
    <div class="container">
      <div class="form-wrapper">
        <div id="timer-box" class="form-timer">
          ⏱ Czas na wypełnienie: <span id="timer-display">30</span>s
        </div>

        <form id="kontakt-form" novalidate>

          <div class="field-group">
            <label class="field-label" for="imie">imię *</label>
            <input type="text" id="imie" name="imie" class="field-input" placeholder="">
            <span class="field-error" id="error-imie">coś jest nie tak</span>
          </div>

          <div class="field-group">
            <label class="field-label" for="nazwisko">nazwisko *</label>
            <input type="text" id="nazwisko" name="nazwisko" class="field-input" placeholder="">
            <span class="field-error" id="error-nazwisko">coś jest nie tak</span>
          </div>

          <div class="field-group">
            <label class="field-label" for="email">e-mail *</label>
            <input type="text" id="email" name="email" class="field-input" placeholder="">
            <span class="field-error" id="error-email">nieprawidłowe dane</span>
          </div>

          <div class="field-group">
            <label class="field-label" for="telefon">tel.</label>
            <input type="text" id="telefon" name="telefon" class="field-input" placeholder="">
            <span class="field-error" id="error-telefon">błąd</span>
          </div>

          <div class="field-group">
            <label class="field-label" for="temat">temat *</label>
            <select id="temat" name="temat" class="field-select">
              <option value="">--</option>
              <option value="rezerwacja">rezerwacja</option>
              <option value="menu">menu</option>
              <option value="inne">inne</option>
            </select>
          </div>

          <div class="field-group">
            <label class="field-label" for="wiadomosc">wiadomość *</label>
            <textarea id="wiadomosc" name="wiadomosc" class="field-textarea" placeholder=""></textarea>
            <span class="field-error" id="error-wiadomosc">formularz zawiera błędy</span>
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="zgoda" name="zgoda">
            <label for="zgoda" style="font-size:8px;color:#dddddd;">
              akceptuję przetwarzanie danych *
            </label>
          </div>

          <button type="submit" class="btn-submit">wyślij</button>

        </form>

        <div class="form-success" id="form-success">
          wysłano.
        </div>

      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-meta">© 2024 Kawiarnia Zacisze · ul. Świętojańska 47, Gdynia</p>
  </div>
</footer>

<script>
  (function () {
    'use strict';
    var TIMER_START = 30;
    var timeLeft = TIMER_START;
    var timerDisplay = document.getElementById('timer-display');
    var timerBox    = document.getElementById('timer-box');
    var form        = document.getElementById('kontakt-form');

    function resetForm() {
      form.reset();
      document.querySelectorAll('.field-error').forEach(function(el) {
        el.classList.remove('visible');
      });
      document.querySelectorAll('.field-input, .field-select, .field-textarea').forEach(function(el) {
        el.setAttribute('aria-invalid', 'false');
      });
    }

    var timerInterval = setInterval(function () {
      timeLeft--;
      timerDisplay.textContent = timeLeft;
      if (timeLeft <= 10) {
        timerBox.classList.add('urgent');
      }

      if (timeLeft <= 0) {
        timeLeft = TIMER_START;
        timerBox.classList.remove('urgent');
        resetForm();
      }
    }, 1000);

    var submitBtn = form.querySelector('button[type="submit"]');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      var hasError = false;
      var imie = document.getElementById('imie');
      var errImie = document.getElementById('error-imie');
      if (imie.value.trim().length === 0) {
        errImie.classList.add('visible');
        hasError = true;
      } else {
        errImie.classList.remove('visible');
      }
      var nazwisko = document.getElementById('nazwisko');
      var errNazwisko = document.getElementById('error-nazwisko');
      if (nazwisko.value.trim().length === 0) {
        errNazwisko.classList.add('visible');
        hasError = true;
      } else {
        errNazwisko.classList.remove('visible');
      }
      var email = document.getElementById('email');
      var errEmail = document.getElementById('error-email');
      var emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim());
      if (!emailOk) {
        errEmail.classList.add('visible');
        hasError = true;
      } else {
        errEmail.classList.remove('visible');
      }
      var telefon = document.getElementById('telefon');
      var errTelefon = document.getElementById('error-telefon');
      if (telefon.value.trim().length > 0 && !/^[0-9 +\-()]{7,20}$/.test(telefon.value.trim())) {
        errTelefon.classList.add('visible');
        hasError = true;
      } else {
        errTelefon.classList.remove('visible');
      }
      var wiadomosc = document.getElementById('wiadomosc');
      var errWiad = document.getElementById('error-wiadomosc');
      if (wiadomosc.value.trim().length < 20) {
        errWiad.classList.add('visible');
        hasError = true;
      } else {
        errWiad.classList.remove('visible');
      }

      var zgoda = document.getElementById('zgoda');
      if (!zgoda.checked) {
        hasError = true;
      }

      if (hasError) {
        return;
      }

      clearInterval(timerInterval);
      form.style.display = 'none';
      document.getElementById('form-success').classList.add('visible');
    });

  })();
</script>

</body>
</html>
